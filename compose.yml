services:
  postgres:
    image: postgres:16
    container_name: micar-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: micar
      POSTGRES_PASSWORD: micar
      POSTGRES_DB: micar
    ports:
      - "${MICAR_POSTGRES_PORT:-5433}:5432"
    volumes:
      - micar_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U micar -d micar"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  micar_pg_data:
