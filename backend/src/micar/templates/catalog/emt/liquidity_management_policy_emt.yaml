clause_key: liquidity_management_policy_emt
track: emt
version: "0.1.0"
title: "Liquiditätsmanagement und Liquiditätsstresstests für E-Geld-Token (Art. 45 und 58 MiCAR)"
anchor_refs:
  - "Art. 45 VO (EU) 2023/1114 (MiCAR)"
  - "Art. 58 VO (EU) 2023/1114 (MiCAR)"
  - "VO (EU) 2025/1264 (MiCAR-Liquiditätsmanagement-RTS)"
  - "EBA, Leitlinien über Liquiditätsstresstests nach MiCAR, EBA/GL/2024/08, final, 19.6.2024"
required_sections:
  - issuer_entity_emt
  - funds_emt
prose_skeleton: |
  ## 1. Anwendungsbereich

  Emittent: {{ fact:issuer_entity_emt.legal_name }}.
  Signifikanter E-Geld-Token: {{ fact:funds_emt.significant_token }}.
  Behördlich auferlegte Liquiditätsanforderungen:
  {{ fact:funds_emt.authority_imposed_liquidity_requirements }}.

  ## 2. Liquiditätsmanagement und Stresstests

  Liquiditätskontrollen: {{ fact:funds_emt.liquidity_controls }}.
  Stresstestrahmen: {{ fact:funds_emt.liquidity_stress_testing_framework }}.
  Sicherungsarrangements: {{ fact:funds_emt.safeguarding_arrangements }}.

  [Lawyer-Review: Anwendbarkeit der zusätzlichen Liquiditätsanforderungen für
   signifikante E-Geld-Token oder behördlich erfasste nicht signifikante
   E-Geld-Token prüfen; Mindestinhalte der VO (EU) 2025/1264 und Parameter
   der geprüften EBA-Leitlinien in Szenarien, Limits, Eskalation und Reporting
   überführen.]
author_note: |
  Conditional document. Render only when the E-Geld-Token is significant or the
  competent authority has imposed the Art. 58 / Art. 45 liquidity requirements.
conditional_on_services: []
conditional_on_any_facts:
  - section: funds_emt
    field: significant_token
    equals: true
  - section: funds_emt
    field: authority_imposed_liquidity_requirements
    equals: true
